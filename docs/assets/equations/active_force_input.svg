<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="120" viewBox="0 0 1000 120" role="img" aria-labelledby="title desc">
  <title id="title">Active force input equation</title>
  <desc id="desc">A of t equals A sub 1 times exponential of minus t over tau sub 1 minus A sub 2 times exponential of minus t over tau sub 2.</desc>
  <rect x="0" y="0" width="100%" height="100%" fill="white"/>
  <style>
    .eq { font-family: 'Times New Roman', Times, serif; font-size: 42px; fill: #111111; }
    .sub { font-size: 65%; baseline-shift: sub; }
  </style>
  <text x="40" y="75" class="eq">
    <tspan>A(t) = A</tspan><tspan class="sub">1</tspan><tspan> · exp(−t/τ</tspan><tspan class="sub">1</tspan><tspan>) − A</tspan><tspan class="sub">2</tspan><tspan> · exp(−t/τ</tspan><tspan class="sub">2</tspan><tspan>)</tspan>
  </text>
</svg>
